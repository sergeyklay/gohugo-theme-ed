name: Dependabot rebase sweep

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

concurrency:
  group: dependabot-rebase-sweep
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  sweep:
    uses: sortie-ai/shared-workflows/.github/workflows/dependabot-rebase-sweep.yml@d7d3eee35a3a49856abbb780d503eee59b5d5c6a # v1.0.0
    secrets:
      bot-token: ${{ secrets.CICDBOT_TOKEN }}
